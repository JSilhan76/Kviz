<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Longelite – Osobní protokol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #D8DBD3;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    box-sizing: border-box;
  }

  .lng-quiz {
    --paper: #EEF0EA;
    --ink: #1A2620;
    --ink-soft: #4C5750;
    --jade: #2F6B57;
    --jade-bright: #4FA388;
    --gold: #A9824A;
    --gold-light: #F5ECD9;
    --line: #D6D9CF;
    --card: #FBFBF7;
    --shadow: 0 1px 2px rgba(26,38,32,.04), 0 8px 30px rgba(26,38,32,.06);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    max-width: 740px;
    width: 100%;
    margin: 0 auto;
    padding: clamp(20px, 4vw, 40px);
    border-radius: 22px;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }

  .lng-quiz * { box-sizing: border-box; }

  .lng-quiz::before {
    content: "";
    position: absolute;
    top: -160px; right: -120px;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(79,163,136,.22), transparent 68%);
    filter: blur(8px);
    pointer-events: none;
    z-index: 0;
  }

  .lng-quiz > * { position: relative; z-index: 1; }

  /* ─── Header ─── */
  .lng-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: clamp(22px, 4vw, 34px);
  }

  .lng-brand {
    font-family: 'Fraunces';
    font-weight: 600;
    font-size: 15px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--jade);
  }

  .lng-prog { flex: 1; display: flex; gap: 6px; }

  .lng-seg {
    height: 4px;
    flex: 1;
    border-radius: 99px;
    background: var(--line);
    overflow: hidden;
  }

  .lng-seg i {
    display: block;
    height: 100%;
    width: 0;
    background: var(--jade-bright);
    border-radius: 99px;
    transition: width .45s cubic-bezier(.22,1,.36,1);
  }

  .lng-seg.done i, .lng-seg.active i { width: 100%; }

  .lng-count {
    font-size: 12px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ─── Intro screen ─── */
  .lng-intro {
    text-align: center;
    padding: 12px 0 4px;
    animation: lngIn .5s cubic-bezier(.22,1,.36,1) both;
  }

  .lng-intro-icon {
    font-size: 44px;
    margin-bottom: 16px;
    display: block;
  }

  .lng-intro h1 {
    font-family: 'Fraunces';
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 500;
    margin: 0 0 12px;
    line-height: 1.1;
    letter-spacing: -.01em;
  }

  .lng-intro p {
    font-size: 15px;
    color: var(--ink-soft);
    margin: 0 0 28px;
    line-height: 1.6;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Gender picker */
  .lng-gender-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 10px;
  }

  .lng-gender-btn {
    flex: 1;
    max-width: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    transition: border-color .18s, background .18s, transform .12s;
  }

  .lng-gender-btn:hover { border-color: var(--jade-bright); transform: translateY(-1px); }
  .lng-gender-btn.sel   { border-color: var(--jade); background: #F1F6F2; }
  .lng-gender-btn span:first-child { font-size: 32px; line-height: 1; }

  .lng-trust {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .lng-trust-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .lng-trust-item span:first-child { color: var(--jade); font-size: 15px; }

  /* ─── Stage animation ─── */
  .lng-stage { animation: lngIn .5s cubic-bezier(.22,1,.36,1) both; }

  @keyframes lngIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  /* ─── Question text ─── */
  .lng-eyebrow {
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--jade);
    margin: 0 0 12px;
    font-weight: 600;
  }

  .lng-q {
    font-family: 'Fraunces';
    font-weight: 500;
    font-size: clamp(22px, 4vw, 30px);
    line-height: 1.15;
    margin: 0 0 6px;
    letter-spacing: -.01em;
  }

  .lng-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 22px;
    line-height: 1.5;
  }

  /* ─── Options ─── */
  .lng-opts {
    display: grid;
    gap: 9px;
    grid-template-columns: 1fr 1fr;
  }

  .lng-opts.single-col { grid-template-columns: 1fr; }

  @media (max-width: 480px) {
    .lng-opts { grid-template-columns: 1fr; }
  }

  .lng-opt {
    display: flex;
    align-items: center;
    gap: 11px;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px 15px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-family: inherit;
    font-size: 14.5px;
    color: var(--ink);
    transition: border-color .18s, background .18s, transform .12s;
    line-height: 1.35;
  }

  .lng-opt:hover { border-color: var(--jade-bright); transform: translateY(-1px); }
  .lng-opt:focus-visible { outline: 2px solid var(--jade); outline-offset: 2px; }

  .lng-opt .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    flex: none;
    display: grid;
    place-items: center;
    transition: border-color .18s;
  }

  .lng-opt .dot::after {
    content: "";
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--jade);
    transform: scale(0);
    transition: transform .18s;
  }

  .lng-opt .check {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--line);
    flex: none;
    display: grid;
    place-items: center;
    transition: border-color .18s, background .18s;
  }

  .lng-opt .check::after {
    content: "";
    width: 11px; height: 7px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) scale(0) translateY(-1px);
    transition: transform .18s;
  }

  .lng-opt.sel { border-color: var(--jade); background: #F1F6F2; }
  .lng-opt.sel .dot { border-color: var(--jade); }
  .lng-opt.sel .dot::after { transform: scale(1); }
  .lng-opt.sel .check { border-color: var(--jade); background: var(--jade); }
  .lng-opt.sel .check::after { transform: rotate(-45deg) scale(1) translateY(-1px); }

  .lng-opt .emoji { font-size: 18px; line-height: 1; flex: none; }

  /* Highlighted option (bundle intent) */
  .lng-opt.opt-highlight {
    border-color: var(--gold);
    background: var(--gold-light);
  }

  .lng-opt.opt-highlight.sel {
    border-color: var(--gold);
    background: #EDD9AA;
  }

  .lng-opt.opt-highlight .check {
    border-color: var(--gold);
  }

  .lng-opt.opt-highlight.sel .check {
    background: var(--gold);
    border-color: var(--gold);
  }

  /* ─── Navigation ─── */
  .lng-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 12px;
  }

  .lng-btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    border-radius: 99px;
    padding: 13px 26px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity .18s, transform .12s, background .18s;
  }

  .lng-btn:active { transform: translateY(1px); }
  .lng-btn--primary { background: var(--jade); color: #fff; }
  .lng-btn--primary:hover { background: #27574a; }
  .lng-btn--primary:disabled { opacity: .35; cursor: not-allowed; }
  .lng-btn--ghost { background: transparent; color: var(--ink-soft); padding: 13px 8px; }
  .lng-btn--ghost:hover { color: var(--ink); }
  .lng-btn--large { font-size: 16px; padding: 15px 34px; }

  /* ─── Results ─── */
  .lng-result-head {
    text-align: center;
    margin-bottom: 8px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
    margin-bottom: 22px;
  }

  .lng-result-head .lng-eyebrow { margin-bottom: 6px; }

  .lng-result-head .lng-q { margin-bottom: 8px; }

  .lng-profile-line {
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin: 0;
  }

  .lng-cards { display: flex; flex-direction: column; gap: 13px; }

  .lng-card {
    display: flex;
    gap: 16px;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    transition: transform .15s;
  }

  .lng-card:hover { transform: translateY(-1px); }

  .lng-card--top {
    border-color: var(--jade);
    box-shadow: 0 10px 34px rgba(47,107,87,.14);
  }

  .lng-card--2nd { border-color: #b5c4bc; }

  .lng-thumb {
    width: 80px; height: 80px;
    flex: none;
    border-radius: 12px;
    object-fit: cover;
    background: #E3E7DD;
  }

  .lng-card-body { flex: 1; min-width: 0; }

  .lng-badges { display: flex; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }

  .lng-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 99px;
  }

  .lng-badge--gold { background: var(--gold-light); color: var(--gold); }
  .lng-badge--green { background: #DCF0E8; color: var(--jade); }
  .lng-badge--gray { background: #E8EBE5; color: var(--ink-soft); }

  .lng-pname {
    font-family: 'Fraunces';
    font-weight: 500;
    font-size: 18px;
    margin: 0 0 4px;
    line-height: 1.2;
  }

  .lng-reason {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 10px;
    line-height: 1.45;
  }

  .lng-buyrow {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .lng-price { font-weight: 700; font-size: 15px; }

  .lng-buy {
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: var(--jade);
    padding: 9px 20px;
    border-radius: 99px;
    transition: background .18s;
    white-space: nowrap;
  }

  .lng-buy:hover { background: #27574a; }
  .lng-card--top .lng-buy { background: var(--gold); }
  .lng-card--top .lng-buy:hover { background: #8f6c3b; }

  @media (max-width: 440px) {
    .lng-card { flex-direction: column; align-items: flex-start; }
    .lng-thumb { width: 100%; height: 120px; }
  }

  /* ─── Section divider ─── */
  .lng-section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 20px 0 10px;
  }

  /* ─── Bundle ─── */
  .lng-bundle {
    margin-top: 20px;
    background: linear-gradient(135deg, #1E2D28, #2F6B57);
    color: #fff;
    border-radius: 18px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .lng-bundle::before {
    content: "";
    position: absolute;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,.05);
    border-radius: 50%;
  }

  .lng-bundle-inner {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .lng-bundle-body { flex: 1; min-width: 0; }

  .lng-bundle .lng-badge { margin-bottom: 6px; }
  .lng-bundle .lng-badge--saving { background: rgba(255,255,255,.15); color: #fff; }

  .lng-bundle h4 {
    font-family: 'Fraunces';
    font-weight: 500;
    font-size: 18px;
    margin: 0 0 5px;
    color: #fff;
  }

  .lng-bundle p {
    font-size: 13px;
    margin: 0 0 12px;
    color: rgba(255,255,255,.78);
    line-height: 1.45;
  }

  .lng-bundle-prices {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }

  .lng-bundle-price-new {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  .lng-bundle-price-old {
    font-size: 14px;
    color: rgba(255,255,255,.55);
    text-decoration: line-through;
  }

  .lng-bundle-saving {
    font-size: 12px;
    font-weight: 600;
    background: #4FA388;
    color: #fff;
    padding: 2px 8px;
    border-radius: 99px;
  }

  .lng-bundle a {
    display: inline-block;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    color: #1E2D28;
    background: #fff;
    padding: 12px 24px;
    border-radius: 99px;
    transition: background .18s;
    white-space: nowrap;
  }

  .lng-bundle a:hover { background: #EDEAE0; }

  @media (max-width: 500px) {
    .lng-bundle-inner { flex-direction: column; align-items: flex-start; }
  }

  /* ─── Social proof bar ─── */
  .lng-social {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }

  .lng-social-item {
    font-size: 12.5px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .lng-social-item strong { color: var(--ink); }

  .lng-restart { display: block; margin: 18px auto 0; }

  /* ─── Cart action buttons ─── */
  .lng-cart-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 28px 0 8px;
  }
  .lng-btn--cart-primary {
    flex: 1;
    min-width: 220px;
    background: var(--jade);
    color: #fff;
    font-size: 15px;
    padding: 15px 20px;
    border-radius: var(--r);
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: background .2s;
  }
  .lng-btn--cart-primary:hover { background: #27574a; }
  .lng-btn--cart-all {
    flex: 1;
    min-width: 220px;
    background: transparent;
    color: var(--jade);
    font-size: 15px;
    padding: 15px 20px;
    border-radius: var(--r);
    border: 2px solid var(--jade);
    cursor: pointer;
    font-weight: 600;
    transition: background .2s, color .2s;
  }
  .lng-btn--cart-all:hover { background: var(--jade); color: #fff; }

  /* ─── Product checkbox ─── */
  .lng-card--unchecked { opacity: 0.4; }

  /* ─── Match bar ─── */
  .lng-match-bar-wrap {
    margin: 6px 0 10px;
  }
  .lng-match-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .lng-match-label strong { font-weight: 700; color: var(--jade); }
  .lng-match-track {
    height: 5px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
  }
  .lng-match-fill {
    height: 100%;
    background: var(--jade);
    border-radius: 99px;
    transition: width .6s ease;
  }

  /* ─── External supplements ─── */
  .lng-ext-section { margin-top: 28px; }
  .lng-ext-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0 10px;
    border-top: 2px solid var(--line);
  }
  .lng-ext-header-left { display: flex; align-items: center; gap: 8px; }
  .lng-ext-header h3 { margin: 0; font-size: 15px; font-weight: 700; color: var(--ink); }
  .lng-ext-count-badge {
    background: #FFF3E8;
    color: #C2691A;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
  }
  .lng-ext-toggle {
    background: none;
    border: 1px solid var(--line);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lng-ext-body { }
  .lng-ext-card {
    background: #FFFDF8;
    border: 1px solid #F0E0C0;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .lng-ext-name {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .lng-ext-mimo {
    background: #FFF3E8;
    color: #C2691A;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .lng-ext-reason { font-size: 13px; color: var(--ink-soft); margin: 0 0 8px; }
  .lng-ext-dose {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--jade);
    background: rgba(47,107,87,.08);
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
  }
  .lng-ext-dose::before { content: '▶ '; }

  /* ─── Optional badge ─── */
  .lng-optional-badge {
    display: inline-block;
    background: var(--gold-light);
    color: var(--gold);
    border-radius: 8px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  /* ─── maxSel hint ─── */
  .lng-maxsel-hint {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: right;
    margin-top: -8px;
    margin-bottom: 4px;
  }
  .lng-maxsel-hint.full { color: var(--jade); font-weight: 600; }

  @media (prefers-reduced-motion: reduce) {
    .lng-stage, .lng-intro { animation: none; }
    .lng-seg i { transition: none; }
  }
</style>
</head>
<body>

<div class="lng-quiz" role="region" aria-label="Longelite osobní protokol">
  <div class="lng-top">
    <span class="lng-brand">Longelite</span>
    <div class="lng-prog" id="lngProg" aria-hidden="true"></div>
    <span class="lng-count" id="lngCount"></span>
  </div>
  <div id="lngApp"></div>
</div>

<script>
(function () {

  // ===== PRODUKTY =====
  var PRODUCTS = [
    { id: 'glycine', name: 'Pure Glycine', price: '598 Kč', bestseller: true, code: 'LGL',
      shoptetId: 48, shoptetPriceId: 48,
      url: 'https://www.longelite.com/pure-glycine/',
      img: 'https://cdn.myshoptet.com/usr/www.longelite.com/user/shop/big/48-4_pure-glycine.jpg?69a7eeba',
      tags: ['spanek', 'regenerace', 'dlouhodobe_zdravi', 'plet', 'sedavy'],
      reason: 'Pure Glycine podporuje noční regeneraci a tvorbu kolagenu. Obsahuje glycin – aminokyselinu zkoumanou v oblasti spánkové kvality a ochrany buněk před oxidačním stresem.' },

    { id: 'magnesium', name: 'Magnesium Boost', price: '629 Kč', bestseller: true, code: 'LMAG',
      shoptetId: 63, shoptetPriceId: 63,
      url: 'https://www.longelite.com/magnesium-boost/',
      img: 'https://cdn.myshoptet.com/usr/www.longelite.com/user/shop/big/63_magnesium-boost.jpg?69a7eced',
      tags: ['spanek', 'stres', 'energie', 'regenerace', 'dlouhodobe_zdravi', 'sedavy'],

  function computeTagScores() {

    [2, 3].forEach(function(qi) {
      var Q    = QUESTIONS[qi];
      var opts = getOpts(Q);

            raw[tag] = (raw[tag] || 0) + opt.tags[tag];
          }
        }
      });
    });
    // Apply multipliers
    var s = {};
    for (var tag in raw) {
      if (raw.hasOwnProperty(tag)) {
        s[tag] = raw[tag] * (TAG_MULT[tag] || 1.0);
      }
    }
    return s;
  }

  function score() {
    var s = computeTagScores();

    // Longevity bonus
    var totalSel = (answers[2] || []).length;
    var lthOpts  = getOpts(QUESTIONS[2]);
    var lthSelected = (answers[2] || []).some(function(oi) {
      return lthOpts[oi] && lthOpts[oi].longTermHealth;
    });
    var longevityMult = (totalSel >= 3 || lthSelected) ? 1.25 : 1.15;

    var ranked = PRODUCTS.map(function(p) {
      if (p.isBundle) return { p: p, sc: -1 };
      if (!passesFilter(p, s)) return { p: p, sc: -1 };
      var sc = 0;
      p.tags.forEach(function(t) { if (s[t]) sc += s[t]; });
      if (p.id === 'longevity') sc *= longevityMult;
      return { p: p, sc: sc };
    }).filter(function(x) { return !x.p.isBundle && x.sc > 0; })
      .sort(function(a, b) { return b.sc - a.sc; });

    // Deduplicate groups
    var seen = {}, out = [];
    ranked.forEach(function(x) {
      var g = x.p.group;
      if (g) { if (seen[g]) return; seen[g] = 1; }
      out.push(x);
    });

    // Fallback
    if (out.length === 0) {
      out = [
        { p: PRODUCTS.filter(function(p){ return p.id === 'magnesium'; })[0], sc: 0 },
        { p: PRODUCTS.filter(function(p){ return p.id === 'glycine'; })[0], sc: 0 }
      ];
    }

    // Shoda %
    var maxSc = out[0] ? out[0].sc || 1 : 1;
    out.forEach(function(x) {
      x.shoda = x.sc > 0 ? Math.max(45, Math.round(45 + (x.sc / maxSc) * 54)) : 45;
    });

    // Greedy výběr: přidávej produkty dokud součet cen nepřesáhne budget
    // Bez omezení = soft cap 6 produktů, jinak plníme budget cenou (žádný pevný strop počtu)
    var totalLimit = (budgetMaxPrice && budgetMaxPrice < 99999) ? budgetMaxPrice : Infinity;
    var hardCap    = (totalLimit === Infinity) ? 6 : 99;
    var selected   = [];
    var overBudget = [];
    var spent      = 0;

    out.forEach(function(x) {
      var price = parsePrice(x.p.price);
      if (selected.length < hardCap && spent + price <= totalLimit) {
        selected.push(x);
        spent += price;
      } else {
        overBudget.push(x);
      }
    });

    out = selected;
    out._overBudget = overBudget.slice(0, 3); // max 3 v sekci "doporučujeme"

    // External/coming-soon recommendations
    out._extSupps = getExternalRecs(s);

    return out;
  }

      + '<p class="lng-eyebrow">' + Q.eyebrow + ' · ' + (step + 1) + ' / ' + total + '</p>'
      + '<h2 class="lng-q">' + Q.q + '</h2>'
      + '<p class="lng-sub">' + (Q.sub || '') + '</p>';

    html += '<div class="lng-opts single-col" role="group">';

    opts.forEach(function (o, idx) {
      var on        = sel.indexOf(idx) > -1;
      var indicator = isMulti ? '<span class="check"></span>' : '<span class="dot"></span>';
      html += '<button type="button" class="lng-opt' + (on ? ' sel' : '') + '"'
        + ' data-idx="' + idx + '" aria-pressed="' + on + '">'
        + indicator
        + '<span>' + o.label + '</span>'
        + '</button>';
    });

    html += '</div><div class="lng-nav">';
    html += step > 0
      ? '<button type="button" class="lng-btn lng-btn--ghost" id="lngBack">← Zpět</button>'
      : '<span></span>';

    if (isMulti || lastQ) {
      var btnLabel = lastQ ? 'Zobrazit doporučení →' : 'Pokračovat →';
      html += '<button type="button" class="lng-btn lng-btn--primary" id="lngNext">'
        + btnLabel + '</button>';
    } else {
      html += '<span></span>';
    }

    html += '</div></div>';
    app.innerHTML = html;
    updateProgress();

    app.querySelectorAll('.lng-opt').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx = +btn.getAttribute('data-idx');
        var cur = answers[step] ? answers[step].slice() : [];
        if (!isMulti) {
          answers[step] = [idx];
          // Derive state
          if (step === 0) { ageTag = opts[idx].ageTag || null; }
          if (step === 1) { gender = opts[idx].gVal   || null; }
          if (step === 4) { budgetMaxPrice = opts[idx].maxPrice || 99999; }
          if (!lastQ) setTimeout(nextStep, 280);
          else renderQuestion();
        } else {
          var p = cur.indexOf(idx);
          if (p > -1) { cur.splice(p, 1); }
          else { cur.push(idx); }
          answers[step] = cur;
          renderQuestion();
        }
      });
    });

    var nb = document.getElementById('lngNext'); if (nb) nb.addEventListener('click', nextStep);
    var bb = document.getElementById('lngBack'); if (bb) bb.addEventListener('click', back);
  }

  function scrollTop() {
    setTimeout(function() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      var quiz = document.querySelector('.lng-quiz');
      if (quiz) quiz.scrollTop = 0;
    }, 30);
  }

  function nextStep() {
    var Q = QUESTIONS[step], sel = answers[step] || [];
    if (Q.type === 'single' && sel.length === 0) return;
    if (step < total - 1) { step++; renderQuestion(); }
    else { step = total; renderResult(); }
    scrollTop();
  }

  function back() {
    if (step > 0) { step--; renderQuestion(); scrollTop(); }
  }

  // ===== RENDER RESULTS =====
  function renderResult() {
    updateProgress();
    getSegs();
    segs.forEach(function (s) { s.classList.add('done'); });

    var ranked  = score();
    var intent  = getPurchaseIntent();

    // All products are primary (budget limit applied in score())
    var primary   = ranked;
    var secondary = [];

    // Build profile summary
    var AGE_LABELS = {
      age_under30: 'do 30 let', age_30_39: '30–39 let',
      age_40_49: '40–49 let', age_50_59: '50–59 let', age_60_plus: '60+ let'
    };
    var q2Opts   = getOpts(QUESTIONS[2]);
    var painSel  = (answers[2] || []).map(function(i) { return q2Opts[i] ? q2Opts[i].label : ''; }).filter(Boolean);
    var profileParts = [];
    if (ageTag) profileParts.push(AGE_LABELS[ageTag] || ageTag);
    if (painSel.length > 0) profileParts.push(painSel.slice(0, 2).join(', ').toLowerCase());
    var profileLine = profileParts.length > 0 ? 'Profil: ' + profileParts.join(' · ') : 'Doporučení připraveno.';

    var html = '<div class="lng-stage">'
      + '<div class="lng-result-head">'
      + '<p class="lng-eyebrow">Doporučení Longelite</p>'
      + '<h2 class="lng-q">Protokol na míru</h2>'
      + '<p class="lng-profile-line">' + profileLine + '</p>'
      + '</div>';

    // Helper: render product card with shoda bar
    function cardHtml(x, idx, isPrimary) {
      var p   = x.p;
      var top = isPrimary && idx === 0;
      var cls = top ? ' lng-card--top' : (isPrimary && idx === 1 ? ' lng-card--2nd' : '');
      return '<div class="lng-card' + cls + '">'
        + '<img class="lng-thumb" src="' + p.img + '" alt="' + p.name + '" loading="lazy" referrerpolicy="no-referrer" data-fb="' + p.name.charAt(0) + '">'
        + '<div class="lng-card-body">'
        + '<div class="lng-badges">'
        + (top ? '<span class="lng-badge lng-badge--gold">★ Nejlepší shoda</span>' : '')
        + (p.bestseller ? '<span class="lng-badge lng-badge--green">Bestseller</span>' : '')
        + '</div>'
        + '<h3 class="lng-pname">' + p.name + '</h3>'
        + '<div class="lng-match-bar-wrap">'
        + '<div class="lng-match-label"><span>Shoda s profilem</span><strong>' + (x.shoda || 70) + '%</strong></div>'
        + '<div class="lng-match-track"><div class="lng-match-fill" style="width:' + (x.shoda || 70) + '%"></div></div>'
        + '</div>'
        + '<p class="lng-reason">' + p.reason + '</p>'
        + '<div class="lng-buyrow"><span class="lng-price">' + p.price + '</span>'
        + '<a class="lng-buy" href="' + p.url + '" target="_blank">Otevřít produkt →</a>'
        + '</div></div></div>';
    }

    // Primary products
    html += '<div class="lng-cards">';
    primary.forEach(function (x, idx) { html += cardHtml(x, idx, true); });
    html += '</div>';

    // Recommended total price
    var totalPrice = primary.reduce(function(sum, x) { return sum + parsePrice(x.p.price); }, 0);
    if (totalPrice > 0) {
      html += '<p style="text-align:right;font-size:13px;font-weight:700;color:var(--ink);margin:4px 0 16px;">'
        + 'Doporučený nákup <span style="font-size:16px;">'
        + totalPrice.toLocaleString('cs-CZ') + ' Kč</span></p>';
    }

    // Produkty mimo rozpočet → sekce "Doporučujeme také"
    var overBudget = ranked._overBudget || [];
    if (overBudget.length > 0) {
      html += '<div style="margin-top:24px;border-top:2px solid var(--line);padding-top:16px;">'
        + '<p class="lng-eyebrow" style="margin-bottom:6px;">Doporučujeme také</p>'
        + '<p style="font-size:13px;color:var(--ink-soft);margin:0 0 14px;">Tyto produkty přesahují váš aktuální rozpočet, ale hodí se k vašemu profilu.</p>'
        + '<div class="lng-cards">';
      overBudget.forEach(function(x) { html += cardHtml(x, 0, false); });
      html += '</div></div>';
    }

    // Bundle – zobrazit pokud bez omezení nebo age 50+
    var showBundle = (budgetMaxPrice >= 99999) || (ageTag === 'age_50_59' || ageTag === 'age_60_plus');
    var bundle = null;
    PRODUCTS.forEach(function (p) { if (p.isBundle) bundle = p; });
    if (bundle && showBundle) {
      var bigSave = intent === 'bundle';
      html += '<div class="lng-bundle">'
        + '<div class="lng-bundle-inner">'
        + '<div class="lng-bundle-body">'
        + '<div class="lng-badges">'
        + '<span class="lng-badge lng-badge--saving">' + (bigSave ? '🚀 Doporučeno pro vás' : 'Vše v jednom') + '</span>'
        + '</div>'
        + '<h4>' + bundle.name + '</h4>'
        + '<p>' + bundle.reason + '</p>'
        + '<div class="lng-bundle-prices">'
        + '<span class="lng-bundle-price-new">' + bundle.price + '</span>'
        + '<span class="lng-bundle-price-old">' + bundle.priceOld + '</span>'
        + '<span class="lng-bundle-saving">Ušetříte ' + bundle.saving + '</span>'
        + '</div>'
        + '<a href="' + bundle.url + '" target="_blank">Získat Core Stack →</a>'
        + '</div>'
        + '</div>'
        + '</div>';
    }

    // External/coming-soon supps section
    var extSupps = ranked._extSupps || [];
    if (extSupps.length > 0) {
      html += '<div class="lng-ext-section" id="lngExtSection">'
        + '<div class="lng-ext-header">'
        + '<div class="lng-ext-header-left">'
        + '<h3>Doplnit do protokolu</h3>'
        + '<span class="lng-ext-count-badge">' + extSupps.length + ' PRODUKTY</span>'
        + '</div>'
        + '<button type="button" class="lng-ext-toggle" id="lngExtToggle">−</button>'
        + '</div>'
        + '<p style="font-size:13px;color:var(--ink-soft);margin:0 0 12px;">Chystané produkty Longelite a externí suplementy, které dobře doplní váš protokol.</p>'
        + '<div class="lng-ext-body" id="lngExtBody">';
      extSupps.forEach(function(e) {
        var badgeHtml;
        if (e.comingSoon) {
          badgeHtml = '<span class="lng-ext-mimo" style="background:#F5ECD9;color:#A9824A;">BRZY DOSTUPNÉ</span>';
        } else {
          badgeHtml = '<span class="lng-ext-mimo">DOPORUČUJEME</span>';
        }
        html += '<div class="lng-ext-card">'
          + '<div class="lng-ext-name"><span>' + e.name + '</span>' + badgeHtml + '</div>'
          + '<p class="lng-ext-reason">' + e.reason + '</p>'
          + '<span class="lng-ext-dose">' + e.dose + '</span>'
          + '</div>';
      });
      html += '</div></div>';
    }

    // Disclaimer
    html += '<div style="background:rgba(26,38,32,.04);border-radius:10px;padding:12px 16px;margin:24px 0 12px;font-size:12px;color:var(--ink-soft);line-height:1.6;">'
      + '<strong>Upozornění:</strong> Tento dotazník neslouží k diagnostice ani léčbě. Doporučení vychází výhradně z vašich odpovědí a slouží k výběru vhodných doplňků stravy. '
      + 'Doplňky stravy nenahrazují pestrou a vyváženou stravu. Pokud užíváte léky nebo máte zdravotní obtíže, konzultujte užívání s lékařem. '
      + 'Odpovědi nejsou ukládány k vaší identitě.'
      + '</div>';

    // Trust/social bar
    html += '<div class="lng-social">'
      + '<div class="lng-social-item">✓ <strong>Formulace na vědeckém základu</strong></div>'
      + '<div class="lng-social-item">✓ <strong>Výroba v ČR</strong></div>'
      + '<div class="lng-social-item">✓ <strong>Doprava zdarma od 2 000 Kč</strong></div>'
      + '</div>';

    html += '<div class="lng-cart-actions" id="lngCartActions">'
      + '<button type="button" class="lng-btn lng-btn--cart-primary" id="lngShopPrimary">🛒 Vložit vybrané do košíku</button>'
      + '</div>';

    html += '<div style="display:flex;gap:10px;justify-content:center;margin-top:18px;">'
      + '<button type="button" class="lng-btn lng-btn--ghost" id="lngBackToQ">← Upravit odpovědi</button>'
      + '<button type="button" class="lng-btn lng-btn--ghost lng-restart" id="lngRestart">Začít znovu</button>'
      + '</div>'
      + '</div>';

    app.innerHTML = html;
    scrollTop();

    // Back to last question
    var backToQ = document.getElementById('lngBackToQ');
    if (backToQ) {
      backToQ.addEventListener('click', function() {
        step = total - 1;
        renderQuestion();
        scrollTop();
      });
    }

    // External supps toggle
    var extToggle = document.getElementById('lngExtToggle');
    var extBody   = document.getElementById('lngExtBody');
    if (extToggle && extBody) {
      extToggle.addEventListener('click', function() {
        var open = extBody.style.display !== 'none';
        extBody.style.display = open ? 'none' : '';
        extToggle.textContent = open ? '+' : '−';
      });
    }

    // Inject toggle buttons into each product card (primary + overBudget)
    var allCards     = app.querySelectorAll('.lng-card');
    var overBudgetItems = ranked._overBudget || [];
    var cardProducts = primary.concat(overBudgetItems);
    var primaryCount2 = primary.length;

    allCards.forEach(function (card, idx) {
      var item = cardProducts[idx];
      if (!item) return;
      var p = item.p;

      // overBudget produkty začínají odškrtnuté
      var isOver  = idx >= primaryCount2;
      var initSel = !isOver;

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'lng-product-check';
      btn.setAttribute('data-id', p.shoptetId);
      btn.setAttribute('data-price', p.shoptetPriceId);
      btn.setAttribute('data-sel', initSel ? 'true' : 'false');
      btn.style.cssText = 'align-self:center;flex-shrink:0;background:none;border:2px solid ' + (initSel ? '#2F6B57' : '#D6D9CF') + ';border-radius:8px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;';

      var box = document.createElement('span');
      box.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:' + (initSel ? '#2F6B57' : '#D6D9CF') + ';font-size:12px;color:#fff;flex-shrink:0;';
      box.textContent = initSel ? '✓' : '';

      var lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:12px;font-weight:600;color:' + (initSel ? '#2F6B57' : '#9aa89f') + ';white-space:nowrap;';
      lbl.textContent = initSel ? 'Vybráno' : 'Přidat';

      if (!initSel) card.style.opacity = '0.65';

      btn.appendChild(box);
      btn.appendChild(lbl);
      card.appendChild(btn);

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        e.preventDefault();
        var sel = btn.getAttribute('data-sel') === 'true';
        sel = !sel;
        btn.setAttribute('data-sel', sel ? 'true' : 'false');
        btn.style.borderColor = sel ? '#2F6B57' : '#D6D9CF';
        box.style.background = sel ? '#2F6B57' : '#D6D9CF';
        box.textContent = sel ? '✓' : '';
        lbl.textContent = sel ? 'Vybráno' : 'Přidat';
        lbl.style.color = sel ? '#2F6B57' : '#9aa89f';
        card.style.opacity = sel ? '1' : '0.65';
      });
    });

    // Add to cart
    function isOnShoptet() {
      return typeof shoptet !== 'undefined' && typeof shoptet.config !== 'undefined';
    }

    function buildHelperUrl(items) {
      var pairs = items
        .filter(function (x) { return x.p && x.p.shoptetId; })
        .map(function (x) { return x.p.shoptetId + '_' + x.p.shoptetPriceId; });
      if (pairs.length === 0) return 'https://www.longelite.com/kosik/';
      return 'https://www.longelite.com/kviz-kosik/?items=' + pairs.join(',');
    }

    var btnPrimary  = document.getElementById('lngShopPrimary');
    var cartActions = document.getElementById('lngCartActions');

    function showCartButton() {
      while (cartActions.firstChild) cartActions.removeChild(cartActions.firstChild);
      var viewBtn = document.createElement('button');
      viewBtn.type = 'button';
      viewBtn.className = 'lng-btn lng-btn--cart-primary';
      viewBtn.textContent = '✓ Přidáno – zobrazit košík';
      viewBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        e.preventDefault();
        window.open('/kosik/', '_blank');
      });
      cartActions.appendChild(viewBtn);
    }

    function hideCartButton() {
      if (btnPrimary) { btnPrimary.disabled = true; btnPrimary.textContent = 'Přidávám…'; }
    }

    function addItemsToCart(items) {
      hideCartButton();
      if (!isOnShoptet()) {
        window.open(buildHelperUrl(items), '_blank');
        showCartButton();
        return;
      }
      var validItems = items.filter(function (x) { return x.p && x.p.shoptetId; });
      if (validItems.length === 0) {
        showCartButton();
        return;
      }
      var i = 0;
      function addNext() {
        if (i >= validItems.length) {
          showCartButton();
          return;
        }
        var p = validItems[i].p;
        i++;
        fetch('/action/Cart/addCartItem/', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'productId=' + p.shoptetId + '&priceId=' + p.shoptetPriceId + '&amount=1&language=cs'
        }).catch(function () {}).then(addNext);
      }
      addNext();
    }

    var cartBusy = false;

    if (btnPrimary) btnPrimary.addEventListener('click', function (e) {
      e.stopPropagation();
      e.preventDefault();
      if (cartBusy) return;
      var selected = [];
      app.querySelectorAll('.lng-product-check[data-sel="true"]').forEach(function (btn) {
        selected.push({ p: { shoptetId: +btn.getAttribute('data-id'), shoptetPriceId: +btn.getAttribute('data-price') } });
      });
      if (selected.length === 0) return;
      cartBusy = true;
      addItemsToCart(selected);
    });

    // Image fallback
    app.querySelectorAll('.lng-thumb').forEach(function (im) {
      im.addEventListener('error', function () {
        this.onerror = null;
        var L = this.getAttribute('data-fb') || 'L';
        this.src = "data:image/svg+xml;utf8," + encodeURIComponent(
          "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'>"
          + "<rect width='80' height='80' rx='12' fill='#E3E7DD'/>"
          + "<text x='50%' y='55%' font-family='Georgia,serif' font-size='34' fill='#2F6B57' "
          + "text-anchor='middle' dominant-baseline='middle'>" + L + "</text></svg>");
      });
    });

    document.getElementById('lngRestart').addEventListener('click', function () {
      step = 0; answers = {}; gender = null; ageTag = null; budgetMaxPrice = 99999;
      progEl.innerHTML = '';
      renderIntro();
    });
  }

})();
</script>
</body>
</html>
