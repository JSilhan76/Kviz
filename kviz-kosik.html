<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <title>Přidávám do košíku…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      margin: 0;
      background: #f9f9f7;
    }
    .msg {
      text-align: center;
      color: #2F6B57;
      padding: 40px;
    }
    .msg h2 { font-size: 22px; margin: 0 0 8px; }
    .msg p  { color: #666; margin: 0; font-size: 15px; }
    .spinner {
      border: 3px solid #E3E7DD;
      border-top: 3px solid #2F6B57;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #c0392b; }
  </style>
</head>
<body>
<div class="msg" id="msg">
  <div class="spinner"></div>
  <h2>Přidávám produkty do košíku&hellip;</h2>
  <p>Chvíli strpení, za okamžik vás přesměrujeme.</p>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);

  // Očekávaný formát: ?items=63_63,48_48,54_54  (productId_priceId)
  var raw = params.get('items') || '';
  var items = raw.split(',').filter(Boolean).map(function (s) {
    var parts = s.split('_');
    return { productId: parseInt(parts[0], 10), priceId: parseInt(parts[1] || parts[0], 10) };
  }).filter(function (x) { return x.productId > 0; });

  if (items.length === 0) {
    window.location.href = '/kosik/';
    return;
  }

  function addToCart(item) {
    return fetch('/action/Cart/addCartItem/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      credentials: 'same-origin',
      body: 'productId=' + item.productId + '&priceId=' + item.priceId + '&amount=1&language=cs'
    }).catch(function (e) {
      console.warn('Nepodařilo se přidat produkt', item.productId, e);
    });
  }

  // Přidáváme postupně, aby se předešlo race conditions
  function addSequentially(i) {
    if (i >= items.length) {
      window.location.href = '/kosik/';
      return;
    }
    addToCart(items[i]).then(function () {
      addSequentially(i + 1);
    });
  }

  addSequentially(0);
})();
</script>
</body>
</html>
